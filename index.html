<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konak Doğal Bal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:#111;
  color:white;
  overflow-y:auto;
}

/* ÜST KAYAN YAZI */
.top-bar{
  position:fixed;
  top:0;
  width:100%;
  background:black;
  overflow:hidden;
  z-index:10;
}

.top-text{
  white-space:nowrap;
  display:inline-block;
  padding:10px;
  color:#00ffcc;
  font-weight:bold;
  animation:scroll 10s linear infinite;
  text-shadow:0 0 10px #00ffcc;
}

@keyframes scroll{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

/* BAŞLIK */
.header{
  margin-top:50px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  animation:fadeIn 2s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(-20px)}
  to{opacity:1;transform:translateY(0)}
}

/* ÜRÜNLER */
.products{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  border-radius:20px;
  overflow:hidden;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.2);
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card h2{
  padding:10px;
}

.card button{
  width:100%;
  padding:15px;
  border:none;
  background:#25D366;
  color:white;
  font-size:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.whatsapp-icon{
  width:22px;
}

</style>
</head>

<body>

<div class="top-bar">
  <div class="top-text">🚚 2000 TL ve üzeri KARGO BEDAVA 🚚</div>
</div>

<div class="header">🍯 Konak Doğal Bal</div>

<div class="products">

  <div class="card">
    <img src="Petek Bal.jpeg">
    <h2>Premium Petek Bal</h2>
    <button onclick="order('Premium Petek Bal')">
      <img class="whatsapp-icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
      Sipariş Ver
    </button>
  </div>

  <div class="card">
    <img src="Süzme bal.jpeg">
    <h2>Doğal Süzme Bal</h2>
    <button onclick="order('Doğal Süzme Bal')">
      <img class="whatsapp-icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
      Sipariş Ver
    </button>
  </div>

  <div class="card">
    <img src="Kara Kovan Balı.jpeg">
    <h2>Özel Kara Kovan Balı</h2>
    <button onclick="order('Kara Kovan Balı')">
      <img class="whatsapp-icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
      Sipariş Ver
    </button>
  </div>

  <div class="card">
    <img src="Doğal Kaya Balı.jpeg">
    <h2>Doğal Kaya Balı</h2>
    <button onclick="order('Doğal Kaya Balı')">
      <img class="whatsapp-icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
      Sipariş Ver
    </button>
  </div>

  <div class="card">
    <img src="Yayla Kasnak Balı.jpeg">
    <h2>Yayla Kasnak Balı</h2>
    <button onclick="order('Yayla Kasnak Balı')">
      <img class="whatsapp-icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
      Sipariş Ver
    </button>
  </div>

</div>

<script>
function order(product){
  let message = `Merhaba, ${product} siparişi vermek istiyorum.`;
  window.open("https://wa.me/905449250253?text=" + encodeURIComponent(message),"_blank");
}
</script>

</body>
</html>
