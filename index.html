<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Konak Doğal Bal</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial;
}

body{
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* ARKA PLAN */
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:url("arkaplan.jpg") center/cover no-repeat;
  filter: blur(8px);
  transform: scale(1.1);
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

/* SAYFA */
.page{
  display:none;
  width:100%;
  height:100%;
  padding-top:60px;
}

.active{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* BAŞLIK */
h1{
  color:white;
  text-shadow:0 0 10px black;
  font-size:34px;
  margin-bottom:20px;
}

/* BUTON */
.btn{
  width:260px;
  padding:15px;
  margin:10px;
  border:none;
  border-radius:15px;
  background:linear-gradient(45deg,#ff9900,#ff6600);
  color:white;
  font-weight:bold;
  font-size:18px;
}

/* ÜRÜNLER */
.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.card{
  background:rgba(255,255,255,0.85);
  padding:10px;
  border-radius:15px;
  text-align:center;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

/* SLIDER */
.slider img{
  width:300px;
  height:200px;
  object-fit:cover;
  border-radius:15px;
}

</style>
</head>

<body>

<!-- ANA SAYFA -->
<div class="page active" id="home">

  <h1>🍯 Konak Doğal Bal Mağazası</h1>

  <button class="btn" onclick="show('products')">🛒 Ürünlerimiz</button>
  <button class="btn" onclick="show('about')">👤 Biz Kimiz</button>

</div>

<!-- ÜRÜNLER -->
<div class="page" id="products">

  <h1>🛒 Ürünlerimiz</h1>

  <div class="products">

    <div class="card">
      <img src="Petek Bal.jpeg">
      <p>Petek Bal</p>
    </div>

    <div class="card">
      <img src="Süzme bal.jpeg">
      <p>Süzme Bal</p>
    </div>

    <div class="card">
      <img src="Kara Kovan Balı.jpeg">
      <p>Kara Kovan</p>
    </div>

    <div class="card">
      <img src="Doğal Kaya Balı.jpeg">
      <p>Doğal Kaya</p>
    </div>

    <div class="card">
      <img src="Yayla Kasnak Balı.jpeg">
      <p>Yayla Kasnak</p>
    </div>

  </div>

  <select id="kg" class="btn">
    <option value="">KG Seç</option>
    <option>1 KG</option>
    <option>2 KG</option>
    <option>3 KG</option>
    <option>4 KG</option>
    <option>5 KG</option>
    <option>6 KG</option>
    <option>7 KG</option>
    <option>8 KG</option>
    <option>9 KG</option>
    <option>10 KG</option>
  </select>

  <button class="btn" onclick="order()">📲 Sipariş Ver</button>
  <button class="btn" onclick="show('home')">⬅ Geri</button>

</div>

<!-- BİZ KİMİZ -->
<div class="page" id="about">

  <h1>👤 Biz Kimiz</h1>

  <div class="slider">
    <img id="img" src="1.jpg">
  </div>

  <button class="btn" onclick="next()">Sonraki ➡</button>
  <button class="btn" onclick="show('home')">⬅ Geri</button>

</div>

<script>

function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* WHATSAPP SİPARİŞ */
function order(){
  let kg = document.getElementById("kg").value;
  if(!kg){
    alert("Lütfen KG seç");
    return;
  }

  window.open(
    "https://wa.me/905449250253?text=" + kg + " bal siparişi",
    "_blank"
  );
}

/* SLIDER */
let imgs=["1.jpg","2.jpg","3.jpg"];
let i=0;

function next(){
  i=(i+1)%imgs.length;
  document.getElementById("img").src=imgs[i];
}

</script>

</body>
</html>
