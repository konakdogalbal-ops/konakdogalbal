<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Konak Doğal Bal</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial;
}

body{
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* ARKAPLAN */
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:url("arkaplan.jpg") center/cover no-repeat;
  filter: blur(8px);
  transform: scale(1.1);
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

/* BANNER */
.topBanner{
  position:fixed;
  top:0;
  width:100%;
  height:55px;
  background:linear-gradient(90deg,#ff6600,#ffcc00,#ff6600);
  display:flex;
  align-items:center;
  overflow:hidden;
  z-index:999;
}

.bannerText{
  white-space:nowrap;
  font-weight:bold;
  color:white;
  padding-left:100%;
  animation:scroll 18s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

/* SAYFALAR */
.page{
  display:none;
  width:100%;
  height:100%;
  padding-top:70px;
}

.active{display:flex; justify-content:center; align-items:center; flex-direction:column;}

/* BAŞLIK */
h1{
  color:white;
  text-shadow:0 0 10px black;
  font-size:36px;
  margin-bottom:20px;
}

/* BUTON */
.btn{
  padding:15px;
  width:250px;
  border:none;
  border-radius:15px;
  background:orange;
  color:white;
  font-weight:bold;
  margin-top:10px;
}

/* ÜRÜNLER */
.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.card{
  background:rgba(255,255,255,0.8);
  padding:10px;
  border-radius:15px;
  text-align:center;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

/* GÖRSEL SLIDER */
.slider img{
  width:300px;
  height:200px;
  object-fit:cover;
  border-radius:15px;
  margin-bottom:10px;
}

@media(max-width:800px){
  .products{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="topBanner">
  <div class="bannerText">
    🚚 2000 TL ÜZERİ KARGO BEDAVA 🚚 2000 TL ÜZERİ KARGO BEDAVA 🚚
  </div>
</div>

<!-- ANA SAYFA -->
<div class="page active" id="home">

  <h1>🍯 Konak Doğal Bal Mağazasına Hoşgeldiniz</h1>

  <button class="btn" onclick="show('products')">🛒 Ürünlerimiz</button>
  <button class="btn" onclick="show('about')">👤 Biz Kimiz</button>

  <select id="kgSelect" class="btn" onchange="enableOrder()">
    <option value="">KG Seç</option>
    <option>1</option><option>2</option><option>3</option>
    <option>4</option><option>5</option><option>6</option>
    <option>7</option><option>8</option><option>9</option><option>10</option>
  </select>

  <button class="btn" id="orderBtn" onclick="order()" style="display:none;">
    📲 Sipariş Ver
  </button>

</div>

<!-- ÜRÜNLER -->
<div class="page" id="products">

  <h1>🛒 Ürünler</h1>

  <div class="products">

    <div class="card">
      <img src="Petek Bal.jpeg">
      <p>Petek Bal</p>
    </div>

    <div class="card">
      <img src="Süzme bal.jpeg">
      <p>Süzme Bal</p>
    </div>

    <div class="card">
      <img src="Kara Kovan Balı.jpeg">
      <p>Kara Kovan</p>
    </div>

    <div class="card">
      <img src="Doğal Kaya Balı.jpeg">
      <p>Doğal Kaya</p>
    </div>

    <div class="card">
      <img src="Yayla Kasnak Balı.jpeg">
      <p>Yayla Kasnak</p>
    </div>

  </div>

  <button class="btn" onclick="show('home')">⬅ Geri</button>
</div>

<!-- BİZ KİMİZ -->
<div class="page" id="about">

  <h1>👤 Biz Kimiz</h1>

  <div class="slider">
    <img id="slideImg" src="1.jpg">
  </div>

  <button class="btn" onclick="nextImg()">Sonraki ➡</button>
  <button class="btn" onclick="show('home')">⬅ Geri</button>

</div>

<script>

let images = ["1.jpg","2.jpg","3.jpg"];
let index = 0;

function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function nextImg(){
  index = (index + 1) % images.length;
  document.getElementById("slideImg").src = images[index];
}

function enableOrder(){
  let kg = document.getElementById("kgSelect").value;
  document.getElementById("orderBtn").style.display = kg ? "block" : "none";
}

function order(){
  let kg = document.getElementById("kgSelect").value;
  window.open("https://wa.me/905449250253?text=" + kg + " KG bal siparişi", "_blank");
}

</script>

</body>
</html>
