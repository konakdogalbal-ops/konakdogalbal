<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konak Doğal Bal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:#0f0f0f;
  color:white;
  overflow-y:auto;
}

/* ÜST KAYAN YAZI */
.top-bar{
  position:fixed;
  top:0;
  width:100%;
  background:black;
  overflow:hidden;
  z-index:100;
}

.top-text{
  display:inline-block;
  white-space:nowrap;
  padding:10px;
  color:#00ffcc;
  font-weight:bold;
  animation:slide 8s linear infinite;
  text-shadow:0 0 10px #00ffcc,0 0 20px #00ffcc;
}

@keyframes slide{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

/* SAYFA */
.page{
  display:none;
  padding-top:60px;
}

.active{
  display:block;
}

/* BAŞLIK */
.header{
  text-align:center;
  margin-top:40px;
  font-size:30px;
  font-weight:bold;
  animation:fade 1.5s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(-20px)}
  to{opacity:1;transform:translateY(0)}
}

/* BUTON */
.btn{
  width:260px;
  padding:15px;
  margin:15px auto;
  display:block;
  border:none;
  border-radius:15px;
  background:linear-gradient(45deg,#ff9900,#ff6600);
  color:white;
  font-size:18px;
}

/* ÜRÜNLER */
.products{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.card{
  background:rgba(255,255,255,0.08);
  border-radius:15px;
  padding:10px;
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.2);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.card h3{
  margin:10px 0;
}

select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:5px;
}

/* WHATSAPP BUTON */
.order-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#25D366;
  padding:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  font-size:18px;
  cursor:pointer;
}

.order-bar img{
  width:25px;
}

</style>
</head>

<body>

<div class="top-bar">
  <div class="top-text">🚚 2000 TL ve üzeri KARGO BEDAVA 🚚</div>
</div>

<!-- ANA SAYFA -->
<div id="home" class="page active">
  <div class="header">🍯 Konak Doğal Bal</div>
  <button class="btn" onclick="show('products')">Ürünlerimiz</button>
</div>

<!-- ÜRÜNLER -->
<div id="products" class="page">
  <div class="header">Ürünler</div>

  <div class="products">

    <div class="card">
      <img src="Petek Bal.jpeg">
      <h3>Petek Bal</h3>
      <select onchange="setProduct('Petek Bal',this.value)">
        <option value="">KG Seç</option>
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
      </select>
    </div>

    <div class="card">
      <img src="Süzme bal.jpeg">
      <h3>Süzme Bal</h3>
      <select onchange="setProduct('Süzme Bal',this.value)">
        <option value="">KG Seç</option>
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
      </select>
    </div>

    <div class="card">
      <img src="Kara Kovan Balı.jpeg">
      <h3>Kara Kovan Balı</h3>
      <select onchange="setProduct('Kara Kovan Balı',this.value)">
        <option value="">KG Seç</option>
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
      </select>
    </div>

    <div class="card">
      <img src="Doğal Kaya Balı.jpeg">
      <h3>Doğal Kaya Balı</h3>
      <select onchange="setProduct('Doğal Kaya Balı',this.value)">
        <option value="">KG Seç</option>
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
      </select>
    </div>

    <div class="card">
      <img src="Yayla Kasnak Balı.jpeg">
      <h3>Yayla Kasnak Balı</h3>
      <select onchange="setProduct('Yayla Kasnak Balı',this.value)">
        <option value="">KG Seç</option>
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
      </select>
    </div>

  </div>
</div>

<!-- WHATSAPP SABİT BAR -->
<div class="order-bar" onclick="order()">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
  Sipariş Ver
</div>

<script>
let selectedProduct="";
let selectedKG="";

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setProduct(product,kg){
  selectedProduct = product;
  selectedKG = kg;
}

function order(){
  if(!selectedProduct || !selectedKG){
    alert("Ürün ve KG seçiniz");
    return;
  }

  let msg = `Merhaba, ${selectedKG} KG ${selectedProduct} siparişi vermek istiyorum.`;
  window.open("https://wa.me/905449250253?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
